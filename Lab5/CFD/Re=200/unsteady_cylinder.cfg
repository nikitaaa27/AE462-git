%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%
%                                                                              %
% SU2 configuration file                                                       %
% Case description: Circular cylinder in crossflow                             %
% Author: Me,Myself and I                                                      %
% Institution: U of I                                                          %
% Date: -----------------                                                      %                                          %                                                                              %
%                                                                              %
%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%

% SOLVER
%
SOLVER= NAVIER_STOKES
KIND_TURB_MODEL= NONE
%
REF_DIMENSIONALIZATION= DIMENSIONAL

% RESTART
%
RESTART_SOL= NO

% COMPRESSIBLE FREE-STREAM
%
MACH_NUMBER= 0.1
REYNOLDS_NUMBER= 200.0
REYNOLDS_LENGTH= 1.0

% REFERENCE VALUES
%
REF_ORIGIN_MOMENT_X= 0.25
REF_ORIGIN_MOMENT_Y= 0.00
REF_ORIGIN_MOMENT_Z= 0.00
REF_LENGTH= 1.0
REF_AREA= 1.0

% BOUNDARY CONDITIONS
%
MARKER_HEATFLUX= ( cylinder, 0.0 )
MARKER_FAR= ( farfield )
MARKER_PLOTTING= ( cylinder )
MARKER_MONITORING= ( cylinder )

% DISCRETIZATION
%
TIME_DOMAIN= YES
TIME_MARCHING= DUAL_TIME_STEPPING-2ND_ORDER
TIME_STEP= 0.02
%
NUM_METHOD_GRAD= WEIGHTED_LEAST_SQUARES
CONV_NUM_METHOD_FLOW= JST
JST_SENSOR_COEFF= ( 0.5, 0.005 )
CONV_NUM_METHOD_TURB= SCALAR_UPWIND
MUSCL_TURB= NO

% SOLUTION METHODS
%
TIME_DISCRE_FLOW= EULER_IMPLICIT
TIME_DISCRE_TURB= EULER_IMPLICIT
CFL_NUMBER= 50
CFL_ADAPT= NO
LINEAR_SOLVER= FGMRES
LINEAR_SOLVER_ERROR= 0.1
LINEAR_SOLVER_ITER= 10

% INNER CONVERGENCE
%
INNER_ITER= 50
CONV_FIELD= REL_RMS_DENSITY
CONV_RESIDUAL_MINVAL= -4
CONV_STARTITER= 0

% TIME CONVERGENCE
%
TIME_ITER= 20000
MAX_TIME= 25.00
%
% Starting iteration and type for windowed-time-averaging
WINDOW_CAUCHY_CRIT= YES
WINDOW_START_ITER= 500
WINDOW_FUNCTION= HANN_SQUARE
%
% Monitored fields
CONV_WINDOW_FIELD= ( TAVG_DRAG, TAVG_LIFT )
% Time Convergence monitoring starts at iteration WINDOW_START_ITER + CONV_WINDOW_STARTITER
CONV_WINDOW_STARTITER= 0
% Epsilon to control the series convergence
CONV_WINDOW_CAUCHY_EPS= 1E-4
% Number of elements to apply the criteria
CONV_WINDOW_CAUCHY_ELEMS= 10

% INPUT/OUTPUT
%
HISTORY_WRT_FREQ_INNER= 0
SCREEN_WRT_FREQ_INNER= 100
%
% Mesh input file
MESH_FILENAME= Cylinder.su2	
MESH_FORMAT= SU2
%
% Restart input files
SOLUTION_FILENAME= restart_flow
SOLUTION_ADJ_FILENAME= restart_adj
%
% Output restart files
RESTART_FILENAME= restart_flow
RESTART_ADJ_FILENAME= restart_adj
%
% Output file names
VOLUME_FILENAME= flows/flow
SURFACE_FILENAME= surface_flow
TABULAR_FORMAT= CSV
CONV_FILENAME= history
%
SCREEN_OUTPUT= ( CUR_TIME, TIME_ITER, INNER_ITER, RMS_DENSITY, REL_RMS_DENSITY, DRAG, LIFT, CAUCHY_TAVG_DRAG, CAUCHY_TAVG_LIFT )
HISTORY_OUTPUT= ( CUR_TIME, TIME_ITER, INNER_ITER, REL_RMS_RES, RMS_RES, AERO_COEFF, TAVG_AERO_COEFF, CAUCHY )
%
OUTPUT_FILES= ( RESTART, PARAVIEW )
OUTPUT_WRT_FREQ= ( 1000, 1 )
